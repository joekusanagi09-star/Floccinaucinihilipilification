<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bouncing Ball in a Square</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
    }canvas {
  background: #020617;
  border: 4px solid blue;
  border-radius: 12px;
}

  </style>
</head>
<body>
  <img src="forkstares
<canvas id="canvas" width="500" height="500"></canvas><script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const squareSize = canvas.width; // square area

let ball = {
  x: 250,
  y: 250,
  radius: 15,
  dx: 3,
  dy: 2
};

function update() {
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Bounce off walls
  if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= squareSize) {
    ball.dx *= -1;
  }

  if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= squareSize) {
    ball.dy *= -1;
  }
}

function draw() {
  ctx.clearRect(0, 0, squareSize, squareSize);

  // Draw square boundary (optional visual)
  ctx.strokeStyle = "#38bdf8";
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, squareSize, squareSize);

  // Draw ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#22c55e";
  ctx.fill();
  ctx.closePath();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
